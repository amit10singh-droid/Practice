name: "Azure Terraform RG Pipeline"

on:
  push:
    branches:
    - main
permissions:
  id-token: write      # Required for requesting the Azure OIDC JWT token
  contents: read       # Required to checkout repository code
  pull-requests: write # Optional: Allows pipeline to write PR comments

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true   # Forces Terraform Azure Provider to use OIDC authentication

jobs:
  terraform:
    name: "Terraform Execution"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env:ARM_CLIENT_ID }}
          tenant-id: ${{ env:ARM_TENANT_ID }}
          subscription-id: ${{ env:ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
